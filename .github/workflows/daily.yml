name: StockAI daily notification

on:
  workflow_dispatch:
  schedule:
    # 10:00 JST, Monday-Friday (GitHub Actions cron uses UTC).
    - cron: "0 1 * * 1-5"

permissions:
  contents: write

concurrency:
  group: stockai-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_RECIPIENT_ID: ${{ secrets.LINE_RECIPIENT_ID }}
      GITHUB_CHARTS_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore latest database
        uses: actions/cache/restore@v4
        with:
          path: data/stockai.db
          key: stockai-db-${{ github.run_id }}
          restore-keys: |
            stockai-db-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Initialize stock universe
        run: python scripts/bootstrap_cloud.py

      - name: Update, analyze, publish charts, and notify LINE
        run: python scripts/run_daily_pipeline.py --notify

      - name: Save updated database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/stockai.db
          key: stockai-db-${{ github.run_id }}

      - name: Upload reports and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stockai-reports-${{ github.run_id }}
          path: |
            reports/*.json
            reports/logs/*.log
          if-no-files-found: ignore
          retention-days: 30

