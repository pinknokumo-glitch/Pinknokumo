name: StockAI evening full-market refresh

on:
  workflow_dispatch:
  schedule:
    # 17:17 JST, Monday-Friday (GitHub Actions cron uses UTC).
    - cron: "17 8 * * 1-5"

permissions:
  contents: read

concurrency:
  group: stockai-database
  cancel-in-progress: false

jobs:
  evening:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_RECIPIENT_ID: ${{ secrets.LINE_RECIPIENT_ID }}
      STOCKAI_JOB_LABEL: 夕方の全市場更新

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore latest database
        uses: actions/cache/restore@v5
        with:
          path: data/stockai.db
          key: stockai-db-${{ github.run_id }}
          restore-keys: |
            stockai-db-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Initialize stock master
        run: python scripts/bootstrap_cloud.py

      - name: Refresh all Prime, Standard, and Growth stocks
        run: python scripts/run_evening_universe.py

      - name: Notify LINE when the evening job fails
        if: failure()
        continue-on-error: true
        run: python scripts/send_failure_notification.py

      - name: Save updated database
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/stockai.db
          key: stockai-db-${{ github.run_id }}
